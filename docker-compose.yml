services:
  api:
    build: .
    ports:
      - "8002:8000"
    volumes:
      - ./data/processed:/app/data/processed
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
